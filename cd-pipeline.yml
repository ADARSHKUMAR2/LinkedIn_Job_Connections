trigger: none 

resources:
  pipelines:
  - pipeline: ci_build                  
    source: 'ci-pipeline'               
    trigger:
      branches:
        include:
          - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # The new connection for Docker
  dockerRegistryServiceConnection: 'ACR-Connection' 
  
  # The connection you already made for Azure CLI
  azureServiceConnection: 'Linkedin-COnnection'     
  
  # Your Azure resource names (replace with your actual names)
  containerRegistry: 'your-actual-registry-name.azurecr.io'
  imageRepository: 'linkedin-backend'
  containerAppName: 'your-actual-container-app-name'
  resourceGroup: 'your-actual-resource-group'

steps:
# Task 1 uses the Docker Registry connection
- task: Docker@2
  displayName: 'Build and Push Docker Image to ACR'
  inputs:
    command: 'buildAndPush'
    containerRegistry: '$(dockerRegistryServiceConnection)' 
    repository: '$(imageRepository)'
    dockerfile: 'backend/Dockerfile'
    tags: |
      $(Build.BuildId)
      latest

# Task 2 uses the Azure Resource Manager connection
- task: AzureCLI@2
  displayName: 'Deploy to Azure Container Apps'
  inputs:
    azureSubscription: '$(azureServiceConnection)'          
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Deploying image $(containerRegistry)/$(imageRepository):$(Build.BuildId)"
      az containerapp update \
        --name $(containerAppName) \
        --resource-group $(resourceGroup) \
        --image $(containerRegistry)/$(imageRepository):$(Build.BuildId)