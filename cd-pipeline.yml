trigger: none 

resources:
  pipelines:
  - pipeline: ci_build                  
    source: 'ci-pipeline'               
    trigger:
      branches:
        include:
          - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # The connection you already made for Azure CLI
  azureServiceConnection: 'Linkedin-COnnection'     
  
  # Your actual Azure Container Registry name
  acrName: 'projectxacr'
  
  # Derived full container registry URL
  containerRegistry: '$(acrName).azurecr.io'
  imageRepository: 'linkedin-backend'
  
  # Your actual Azure resource names
  containerAppName: 'project-x-app'
  resourceGroup: 'project-x-rg'

steps:
# Task 1: Use Azure CLI to log in to ACR, build, and push
- task: AzureCLI@2
  displayName: 'Build and Push Docker Image to ACR'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      # Login to ACR using Azure CLI
      az acr login --name $(acrName)

      # Build the Docker image using backend/ as context so pyproject.toml & uv.lock are found
      docker build \
        -t $(containerRegistry)/$(imageRepository):$(Build.BuildId) \
        -t $(containerRegistry)/$(imageRepository):latest \
        -f backend/Dockerfile \
        backend/

      # Push both tags
      docker push $(containerRegistry)/$(imageRepository):$(Build.BuildId)
      docker push $(containerRegistry)/$(imageRepository):latest

# Task 2: Deploy to Azure Container Apps
- task: AzureCLI@2
  displayName: 'Deploy to Azure Container Apps'
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      echo "Deploying image $(containerRegistry)/$(imageRepository):$(Build.BuildId)"
      az containerapp update \
        --name $(containerAppName) \
        --resource-group $(resourceGroup) \
        --image $(containerRegistry)/$(imageRepository):$(Build.BuildId)