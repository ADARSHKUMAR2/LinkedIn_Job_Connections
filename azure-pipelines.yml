trigger:
  branches:
    include:
    - main

pr:
  branches:
    include:
    - main

stages:
- stage: ValidateBackend
  displayName: 'Lint & Test Python Backend'
  jobs:
  - job: RunBackendChecks
    pool:
      vmImage: 'ubuntu-latest'
    services:
      postgres_db:
        image: postgres:15
        env:
          POSTGRES_USER: mock_user
          POSTGRES_PASSWORD: mock_password
          POSTGRES_DB: mock_db
        ports:
        - 5432:5432

    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
      displayName: 'Provision Python 3.11'

    - script: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "##vso[task.prependpath]$HOME/.local/bin"
      displayName: 'Install Astral uv Package Manager'

    - script: |
        cd backend
        uv venv
        uv pip install -e .
      displayName: 'Compile Project Virtual Environment'

    - script: |
        cd backend
        # 🆕 Run migrations to bring the empty container up to speed before checking models
        uv run alembic upgrade head
        # Run Alembic structural check against the migrated schema matrix
        uv run alembic check
      displayName: 'Validate Database Migrations Map Consistency'
      env:
        # Target the running container instance securely
        DATABASE_URL: 'postgresql://mock_user:mock_password@localhost:5432/mock_db'

- stage: ValidateFrontend
  displayName: 'Compile Next.js Production Build'
  dependsOn: ValidateBackend
  jobs:
  - job: RunFrontendChecks
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Provision Node.js v20'

    - script: |
        cd frontend
        npm install --legacy-peer-deps
        npm run build
      displayName: 'Execute Production Next.js Compiler Check'